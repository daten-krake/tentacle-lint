name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          mkdir -p dist
          go build -ldflags "-s -w -X main.version=${VERSION}" -o dist/tentacle-lint ./cmd/tentacle-lint
          cd dist
          tar czf "tentacle-lint_${VERSION}_${GOOS}_${GOARCH}.tar.gz" tentacle-lint

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tentacle-lint-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set version
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate and verify checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz > checksums.txt
          echo "=== Checksums ==="
          cat checksums.txt
          sha256sum -c checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            | OS | Arch | Binary |
            |---|---|---|
            | Linux | amd64 | `tentacle-lint_${{ steps.vars.outputs.version }}_linux_amd64.tar.gz` |
            | Linux | arm64 | `tentacle-lint_${{ steps.vars.outputs.version }}_linux_arm64.tar.gz` |
            | macOS | amd64 | `tentacle-lint_${{ steps.vars.outputs.version }}_darwin_amd64.tar.gz` |
            | macOS | arm64 | `tentacle-lint_${{ steps.vars.outputs.version }}_darwin_arm64.tar.gz` |
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}